name: 🛡️ AI Security Audit
on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      model:
        description: 'LLM Model to use'
        required: false
        default: 'agentica-org/deepcoder-14b-preview:free'
        type: choice
        options:
          - 'agentica-org/deepcoder-14b-preview:free'
          - 'qwen/qwen-2.5-coder-32b-instruct:free'
          - 'meta-llama/llama-3.3-70b-instruct:free'
          - 'moonshotai/kimi-dev-72b:free'
      advanced_analysis:
        description: 'Enable advanced multi-model analysis'
        required: false
        default: false
        type: boolean

jobs:
  security-audit:
    name: AI Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install click
      
      - name: Start Security Auditor Service
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl -f http://localhost:8000/health || exit 1
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      
      - name: Run Security Scan
        id: scan
        run: |
          python auditor/cli.py scan \
            --path . \
            --model "${{ github.event.inputs.model || 'agentica-org/deepcoder-14b-preview:free' }}" \
            --output-format github \
            --output-file security-report.md \
            --severity-filter medium \
            --exclude "*/tests/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/.git/*" \
            ${{ github.event.inputs.advanced_analysis == 'true' && '--advanced' || '--no-advanced' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.md
          retention-days: 30
      
      - name: Comment on PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('security-report.md', 'utf8');
              
              // Find existing comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const existingComment = comments.data.find(comment => 
                comment.body.includes('🛡️ AI Security Audit Results')
              );
              
              const commentBody = `${report}
              
              ---
              <details>
              <summary>🔧 Audit Configuration</summary>
              
              - **Model**: ${{ github.event.inputs.model || 'agentica-org/deepcoder-14b-preview:free' }}
              - **Advanced Analysis**: ${{ github.event.inputs.advanced_analysis == 'true' && 'Enabled' || 'Disabled' }}
              - **Workflow**: \`${{ github.workflow }}\`
              - **Triggered by**: @${{ github.actor }}
              </details>`;
              
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
              }
            } catch (error) {
              console.log('No security report found or error reading file:', error.message);
            }
      
      - name: Security Gate Check
        run: |
          python auditor/cli.py scan \
            --path . \
            --model "${{ github.event.inputs.model || 'agentica-org/deepcoder-14b-preview:free' }}" \
            --output-format json \
            --severity-filter high \
            --fail-on-high \
            --exclude "*/tests/*" "*/node_modules/*" "*/.git/*"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Safety
        run: pip install safety
      
      - name: Audit Python Dependencies
        run: |
          pip install -r requirements.txt
          safety check --json --output safety-report.json || true
      
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: safety-report.json