services:
  # Main FastAPI Application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER}
      - OPENROUTER_TITLE=${OPENROUTER_TITLE}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      # Redis Configuration
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Celery Configuration
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./chroma_db:/usr/src/app/chroma_db
      - ./data:/usr/src/app/data
    depends_on:
      - redis
    # Force IPv4 to avoid connectivity issues
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1

  # Celery Worker for Security Scans
  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_REFERER=${OPENROUTER_REFERER}
      - OPENROUTER_TITLE=${OPENROUTER_TITLE}
      # Redis Configuration
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Celery Configuration
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./chroma_db:/usr/src/app/chroma_db
      - ./data:/usr/src/app/data
    depends_on:
      - redis
    command: ["sh", "-c", "celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q security_scans,llm_analysis,default"]
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1

  # Celery Monitoring (Flower)
  flower:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    environment:
      # Celery Configuration
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    command: ["sh", "-c", "celery -A app.celery_app flower --port=5555"]
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1

volumes:
  redis_data:
